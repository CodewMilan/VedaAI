<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!--
      New brand icon: dark maroon top → bright orange-red bottom-right,
      glossy "iOS app icon" feel. Matches /public/icon.png reference.
    -->

    <!-- Base diagonal gradient: deep dark maroon at top-left → vivid orange-red bottom-right -->
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#160807"/>
      <stop offset="55%"  stop-color="#7e2a13"/>
      <stop offset="100%" stop-color="#ff5a26"/>
    </linearGradient>

    <!-- Warm radial glow on lower-right adds the "lit from below" feel of the reference -->
    <radialGradient id="glow" cx="0.78" cy="0.85" r="0.85" fx="0.85" fy="0.95">
      <stop offset="0%"  stop-color="#ff7a3c" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#ff5a26" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff5a26" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner top highlight (the subtle shine on every iOS icon) -->
    <linearGradient id="topShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="25%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Bottom edge shadow for depth -->
    <linearGradient id="botShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="70%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.22"/>
    </linearGradient>

    <!-- Sheen on left arm of V (matches veda-logo.tsx convention) -->
    <linearGradient id="sheen"
      x1="34.7749" y1="11.2061"
      x2="34.7749" y2="33.9908"
      gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="33%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="76%"  stop-color="#0E1513"/>
      <stop offset="100%" stop-color="#0E1513"/>
    </linearGradient>

    <clipPath id="bounds">
      <rect width="64" height="64" rx="14"/>
    </clipPath>
  </defs>

  <!-- Layer 1: solid base color so transparent edges read correctly at small sizes -->
  <rect width="64" height="64" rx="14" fill="#1a0a08"/>

  <!-- Layer 2: diagonal dark→orange gradient -->
  <rect clip-path="url(#bounds)" width="64" height="64" fill="url(#base)"/>

  <!-- Layer 3: warm radial glow on lower-right -->
  <rect clip-path="url(#bounds)" width="64" height="64" fill="url(#glow)"/>

  <!-- Layer 4: top inner highlight -->
  <rect clip-path="url(#bounds)" width="64" height="64" fill="url(#topShine)"/>

  <!-- Layer 5: bottom inner shadow -->
  <rect clip-path="url(#bounds)" width="64" height="64" fill="url(#botShadow)"/>

  <!--
    V mark — Figma-native coords scaled to fill 70% of canvas.
    scale = 44.8/28 = 1.6   translate = (-31.543, -4.101)
  -->
  <g clip-path="url(#bounds)" transform="translate(-31.543 -4.101) scale(1.6)">
    <!-- left arm -->
    <path fill-rule="evenodd" clip-rule="evenodd"
      d="M42.4413 30.2153C42.4413 30.2153 43.1688 32.1573 43.8355 32.2789H35.4112C33.7141 32.2789 32.1993 31.3079 31.714 29.487L26.805 14.9207C26.805 14.9207 26.381 13.1606 25.7143 12.8571H34.3204C36.0176 12.9179 37.1691 13.5247 37.8357 15.7706L42.4413 30.2153Z"
      fill="#ffffff"/>
    <!-- left arm fold shadow -->
    <path opacity="0.18" fill-rule="evenodd" clip-rule="evenodd"
      d="M42.4413 30.2153C42.4413 30.2153 43.1688 32.1573 43.8355 32.2789H35.4112C33.7141 32.2789 32.1993 31.3079 31.714 29.487L26.805 14.9207C26.805 14.9207 26.381 13.1606 25.7143 12.8571H34.3204C36.0176 12.9179 37.1691 13.5247 37.8357 15.7706L42.4413 30.2153Z"
      fill="url(#sheen)"/>
    <!-- right arm -->
    <path fill-rule="evenodd" clip-rule="evenodd"
      d="M37.0471 30.2149C37.0471 30.2149 36.3196 32.1569 35.6529 32.2784H44.0772C45.7743 32.2784 47.2891 31.3074 47.7744 29.4865L52.6231 14.9207C52.6231 14.9207 53.0471 13.1606 53.7138 12.8571H45.168C43.4709 12.8571 42.3801 13.464 41.7135 15.7098L37.0471 30.2149Z"
      fill="#ffffff"/>
  </g>
</svg>
